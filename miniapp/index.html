<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>CRM Admin</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Экран, если открыли не через Telegram -->
  <div id="telegram-gate" class="telegram-gate hidden">
    <div class="gate-card">
      <div class="gate-icon">🔐</div>
      <h1>CRM Admin</h1>
      <p>Админ-панель доступна только через Telegram.</p>
      <p class="gate-hint">Откройте бота и нажмите кнопку <strong>«🔧 Админ-панель»</strong></p>
    </div>
  </div>

  <div id="app-root" class="app hidden">
    <aside class="sidebar">
      <div class="logo">
        <span class="logo-icon">✦</span>
        <span class="logo-text">CRM Admin</span>
      </div>
      <nav class="nav">
        <button class="nav-item active" data-page="dashboard">📊 Dashboard</button>
        <button class="nav-item" data-page="calendar">📅 Календарь</button>
        <button class="nav-item" data-page="clients">👥 Клиенты</button>
        <button class="nav-item" data-page="appointments">📋 Записи</button>
        <button class="nav-item" data-page="statistics">📈 Статистика</button>
      </nav>
    </aside>

    <main class="content">
      <header class="topbar">
        <h1 id="page-title">Dashboard</h1>
        <div class="topbar-right">
          <span class="badge" id="admin-name">Админ</span>
        </div>
      </header>

      <div id="error-banner" class="error-banner hidden"></div>

      <!-- Dashboard -->
      <section id="page-dashboard" class="page active">
        <div class="stats-grid" id="dashboard-stats">
          <div class="loading">Загрузка данных...</div>
        </div>
        <div class="card">
          <h2>Ближайшие записи</h2>
          <div id="upcoming-list" class="list">
            <div class="loading">Загрузка...</div>
          </div>
        </div>
      </section>

      <!-- Calendar -->
      <section id="page-calendar" class="page">
        <div class="card">
          <div class="calendar-header">
            <button class="btn btn-ghost" id="cal-prev">◀</button>
            <h2 id="cal-month-label"></h2>
            <button class="btn btn-ghost" id="cal-next">▶</button>
          </div>
          <div class="calendar-weekdays">
            <span>Пн</span><span>Вт</span><span>Ср</span><span>Чт</span><span>Пт</span><span>Сб</span><span>Вс</span>
          </div>
          <div id="calendar-grid" class="calendar-grid"></div>
        </div>
        <div class="card" id="calendar-day-detail">
          <h2 id="cal-day-title">Выберите день</h2>
          <div id="cal-day-list" class="list"></div>
        </div>
      </section>

      <!-- Clients -->
      <section id="page-clients" class="page">
        <div class="card">
          <div class="search-bar">
            <input type="text" id="client-search" placeholder="Поиск по имени, username, телефону...">
          </div>
          <div id="clients-list" class="table-wrap"></div>
        </div>
      </section>

      <!-- Appointments -->
      <section id="page-appointments" class="page">
        <div class="card">
          <div class="filters">
            <select id="filter-status">
              <option value="">Все статусы</option>
              <option value="confirmed">Подтверждена</option>
              <option value="pending">Ожидает</option>
              <option value="completed">Завершена</option>
              <option value="cancelled">Отменена</option>
            </select>
          </div>
          <div id="appointments-list" class="table-wrap"></div>
        </div>
      </section>

      <!-- Statistics -->
      <section id="page-statistics" class="page">
        <div class="stats-grid" id="stats-cards"></div>
        <div class="charts-grid">
          <div class="card">
            <h2>По статусам</h2>
            <div id="chart-status" class="bar-chart"></div>
          </div>
          <div class="card">
            <h2>По услугам</h2>
            <div id="chart-services" class="bar-chart"></div>
          </div>
          <div class="card">
            <h2>По мастерам</h2>
            <div id="chart-performers" class="bar-chart"></div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <!-- Модальное окно редактирования записи -->
  <div id="modal" class="modal hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-content">
      <h2>Редактировать запись</h2>
      <form id="edit-form">
        <input type="hidden" id="edit-id">
        <label>Услуга
          <select id="edit-service" required></select>
        </label>
        <label>Мастер
          <select id="edit-performer" required></select>
        </label>
        <label>Дата
          <input type="date" id="edit-date" required>
        </label>
        <label>Время
          <input type="time" id="edit-time" required>
        </label>
        <label>Статус
          <select id="edit-status" required>
            <option value="confirmed">Подтверждена</option>
            <option value="pending">Ожидает</option>
            <option value="completed">Завершена</option>
            <option value="cancelled">Отменена</option>
          </select>
        </label>
        <div class="modal-actions">
          <button type="button" class="btn btn-danger" id="btn-cancel-appt">Отменить запись</button>
          <button type="button" class="btn btn-ghost" id="btn-close-modal">Закрыть</button>
          <button type="submit" class="btn btn-primary">Сохранить</button>
        </div>
      </form>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script src="js/api.js?v=5"></script>
  <script src="js/app.js?v=5"></script>
</body>
</html>
